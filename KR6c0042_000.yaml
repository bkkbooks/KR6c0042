front:
  text: 金剛經纂要刊定記并序釋氏教金剛經世所由來尚矣自秦至今凡幾百載諷誦無卑高感應盈簡牘利及幽壞而達乎神明蓋趣大之坦塗破小之宏略也故補處頌以為本二論釋而有貫諸疏互解或依或違圭山大師撮掇精英黜逐浮僞命曰纂要蓋取中庸復申記略用備傳習石壁師仍貫義意別為廣録美則美矣辭或繁長後學多不便用今更刊定翦削煩亂俾流而無滯學而思講庶吾道無墜地之患也已大宋天聖紀號之明年季冬月甲子日序云
